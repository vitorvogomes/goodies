# Goodies — Fly.io (API FastAPI). PLACEHOLDER — configuração real em STORY-00-08-09.
# Deploy: Fly.io para a API (ADR-001) | Vercel para o web/.
app = "goodies-api"
primary_region = "gru"  # São Paulo

[build]
  # Dockerfile/builder definidos em STORY-00-08-09 (CI/CD + deploy)

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  # Gate m0: GET /api/v1/health → 200 com Postgres + Redis
  [[http_service.checks]]
    method = "GET"
    path = "/api/v1/health"
    interval = "30s"
    timeout = "5s"

[env]
  ENV = "production"
  API_PORT = "8000"

# Segredos (DATABASE_URL, REDIS_URL, JWT_*, etc.) via `fly secrets set` — NUNCA no fly.toml.
# Lista de chaves: ver .env.example.
